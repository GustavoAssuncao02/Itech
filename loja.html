<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iTech - Loja Apple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --paper: #f7f8fa;
    --paper-strong: #eef1f5;
    --ink: #17181c;
    --muted: #667085;
    --line: #dde3eb;
    --blue: #0071e3;
    --blue-dark: #005fbe;
    --green: #18a058;
    --amber: #b7791f;
    --red: #c0362c;
    --radius: 8px;
    --shadow: 0 18px 48px rgba(23, 24, 28, 0.12);
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-width: 320px;
    margin: 0;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(247, 248, 250, 0.95) 0, rgba(255, 255, 255, 0) 430px),
      var(--white);
    font-family: "DM Sans", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body.modal-open {
    overflow: hidden;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button,
  input {
    font: inherit;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  .top-line {
    height: 3px;
    background: linear-gradient(90deg, var(--blue), #16a3d8, var(--green));
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.9);
    border-bottom: 1px solid rgba(23, 24, 28, 0.08);
    backdrop-filter: blur(18px);
  }

  .nav-shell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1180px;
    height: 60px;
    margin: 0 auto;
    padding: 0 24px;
    gap: 24px;
  }

  .brand {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 1.32rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .brand span {
    color: var(--blue);
  }

  .nav-links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }

  .nav-links a,
  .footer-links a {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
    transition: color 160ms ease;
  }

  .nav-links a:hover,
  .footer-links a:hover,
  .nav-links a[aria-current="page"] {
    color: var(--blue);
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .button,
  .icon-button,
  .product-button,
  .file-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 44px;
    border: 1px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 800;
    line-height: 1;
    transition:
      transform 160ms ease,
      border-color 160ms ease,
      background 160ms ease,
      color 160ms ease,
      opacity 160ms ease;
  }

  .button {
    padding: 0 20px;
  }

  .button.primary,
  .product-button.primary {
    color: var(--white);
    background: var(--blue);
    box-shadow: 0 12px 30px rgba(0, 113, 227, 0.22);
  }

  .button.dark,
  .product-button.dark {
    color: var(--white);
    background: var(--ink);
  }

  .button.secondary,
  .product-button.secondary,
  .file-button {
    color: var(--ink);
    background: rgba(255, 255, 255, 0.78);
    border-color: var(--line);
  }

  .button:hover,
  .icon-button:hover,
  .product-button:hover,
  .file-button:hover {
    transform: translateY(-1px);
  }

  .button.primary:hover,
  .product-button.primary:hover {
    background: var(--blue-dark);
  }

  .button.dark:hover,
  .product-button.dark:hover {
    background: var(--blue);
  }

  .button.secondary:hover,
  .product-button.secondary:hover,
  .file-button:hover {
    border-color: rgba(0, 113, 227, 0.42);
    color: var(--blue);
  }

  .icon-button {
    width: 42px;
    min-height: 42px;
    color: var(--ink);
    background: var(--white);
    border-color: var(--line);
  }

  .product-button {
    width: 100%;
    min-height: 42px;
    padding: 0 14px;
  }

  .product-button:disabled,
  .button:disabled {
    cursor: not-allowed;
    opacity: 0.48;
    transform: none;
  }

  .page {
    min-height: calc(100vh - 64px);
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr);
    align-items: center;
    max-width: 1180px;
    min-height: calc(100vh - 63px);
    margin: 0 auto;
    padding: 78px 24px 62px;
    gap: 48px;
  }

  .eyebrow,
  .section-label,
  .pill {
    color: var(--blue);
    font-size: 0.74rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 0 13px;
    margin-bottom: 20px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 999px;
  }

  .hero h1,
  .section-heading h2,
  .collection-hero h1,
  .detail-copy h1 {
    margin: 0;
    color: var(--ink);
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
  }

  .hero h1 {
    max-width: 670px;
    font-size: clamp(3.1rem, 7vw, 5.3rem);
  }

  .hero h1 span,
  .collection-hero h1 span {
    color: var(--blue);
  }

  .hero p,
  .collection-hero p,
  .detail-copy > p,
  .section-heading p {
    color: var(--muted);
    font-weight: 400;
    line-height: 1.68;
  }

  .hero p {
    max-width: 560px;
    margin: 22px 0 0;
    font-size: 1.06rem;
  }

  .hero-actions,
  .detail-actions,
  .card-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .hero-actions {
    margin-top: 34px;
  }

  .hero-display {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 560px;
    overflow: hidden;
    background:
      radial-gradient(circle at 48% 36%, rgba(0, 113, 227, 0.18), transparent 32%),
      linear-gradient(145deg, #ffffff, #eaf0f6);
    border: 1px solid rgba(221, 227, 235, 0.92);
    border-radius: var(--radius);
  }

  .hero-display::after {
    content: "";
    position: absolute;
    right: 9%;
    bottom: 54px;
    left: 9%;
    height: 34px;
    border-radius: 50%;
    background: rgba(23, 24, 28, 0.16);
    filter: blur(18px);
  }

  .hero-device-stack {
    position: relative;
    z-index: 2;
    display: grid;
    place-items: center;
    width: min(86%, 430px);
    min-height: 410px;
  }

  .section {
    padding: 82px 24px;
  }

  .section.alt {
    background: var(--paper);
    border-block: 1px solid rgba(221, 227, 235, 0.78);
  }

  .section-heading {
    max-width: 1180px;
    margin: 0 auto 34px;
  }

  .section-heading h2 {
    margin-top: 8px;
    font-size: clamp(2.25rem, 5vw, 3.4rem);
  }

  .section-heading p {
    max-width: 620px;
    margin: 14px 0 0;
  }

  .category-grid,
  .product-grid {
    display: grid;
    max-width: 1180px;
    margin: 0 auto;
    gap: 16px;
  }

  .category-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .product-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .category-card,
  .product-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition:
      transform 160ms ease,
      border-color 160ms ease,
      box-shadow 160ms ease;
  }

  .category-card {
    display: grid;
    min-height: 174px;
    align-content: start;
    gap: 13px;
    padding: 24px;
  }

  .category-card:hover,
  .product-card:hover {
    border-color: rgba(0, 113, 227, 0.42);
    box-shadow: 0 18px 42px rgba(23, 24, 28, 0.08);
    transform: translateY(-3px);
  }

  .category-icon {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    color: var(--blue);
    background: rgba(0, 113, 227, 0.08);
    border-radius: var(--radius);
  }

  .category-card strong {
    font-size: 1.08rem;
  }

  .category-card > span:not(.category-icon),
  .product-card p,
  .product-meta,
  .breadcrumb {
    color: var(--muted);
  }

  .category-card .category-icon {
    color: var(--blue);
    line-height: 1;
  }

  .category-card > span:not(.category-icon),
  .product-card p {
    line-height: 1.55;
  }

  .product-card {
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 440px;
    padding: 16px;
    overflow: hidden;
  }

  .product-card.is-blocked {
    background: linear-gradient(180deg, #ffffff, #f8fafc);
  }

  .product-link {
    display: flex;
    flex: 1;
    flex-direction: column;
    min-width: 0;
  }

  .product-visual {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 176px;
    margin-bottom: 16px;
    overflow: hidden;
    background: var(--paper);
    border-radius: var(--radius);
  }

  .product-visual.blue { background: linear-gradient(145deg, #eaf6ff, #c8e5ff); }
  .product-visual.green { background: linear-gradient(145deg, #ecfdf3, #c8f2d4); }
  .product-visual.silver { background: linear-gradient(145deg, #ffffff, #dfe5ec); }
  .product-visual.graphite { background: linear-gradient(145deg, #2a3240, #0f1721); }
  .product-visual.orange { background: linear-gradient(145deg, #fff7ed, #fed7aa); }
  .product-visual.pink { background: linear-gradient(145deg, #fff1f2, #ffd1dc); }
  .product-visual.starlight { background: linear-gradient(145deg, #fffaf0, #e9dfc9); }

  .pill {
    align-self: flex-start;
    padding: 5px 9px;
    background: rgba(0, 113, 227, 0.08);
    border-radius: 999px;
  }

  .product-card h3 {
    margin: 14px 0 8px;
    font-size: 1.08rem;
    line-height: 1.2;
  }

  .product-card p {
    margin: 0;
    font-size: 0.92rem;
  }

  .product-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .product-meta span {
    padding: 5px 8px;
    background: var(--paper);
    border-radius: 999px;
  }

  .price {
    display: block;
    margin-top: auto;
    padding-top: 18px;
    color: var(--ink);
    font-size: 1.34rem;
    line-height: 1.1;
  }

  .installments {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.84rem;
    font-weight: 600;
  }

  .card-actions {
    margin-top: 16px;
  }

  .card-actions .product-button {
    flex: 1 1 120px;
  }

  .stock-badge {
    position: absolute;
    top: 26px;
    right: 26px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    color: var(--white);
    background: var(--red);
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .stock-badge.available {
    background: var(--green);
  }

  .collection-hero,
  .detail-page,
  .checkout-panel,
  .footer {
    max-width: 1180px;
    margin: 0 auto;
    padding-inline: 24px;
  }

  .collection-hero {
    padding-top: 64px;
    padding-bottom: 26px;
  }

  .breadcrumb {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 18px;
    font-size: 0.9rem;
    font-weight: 700;
  }

  .breadcrumb a {
    color: var(--blue);
  }

  .collection-hero h1 {
    max-width: 720px;
    font-size: clamp(2.7rem, 7vw, 5rem);
  }

  .collection-hero p {
    max-width: 680px;
    margin: 18px 0 0;
    font-size: 1.04rem;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    max-width: 1180px;
    margin: 0 auto 26px;
    padding: 0 24px;
    gap: 10px;
  }

  .filter-chip {
    display: inline-flex;
    align-items: center;
    min-height: 38px;
    padding: 0 14px;
    color: var(--muted);
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 800;
  }

  .filter-chip.active,
  .filter-chip:hover {
    color: var(--blue);
    border-color: rgba(0, 113, 227, 0.42);
  }

  .detail-page {
    padding-top: 56px;
    padding-bottom: 88px;
  }

  .detail-layout {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) minmax(0, 0.95fr);
    align-items: center;
    gap: 44px;
  }

  .detail-media {
    display: grid;
    place-items: center;
    min-height: 520px;
    background:
      radial-gradient(circle at 50% 40%, rgba(0, 113, 227, 0.14), transparent 36%),
      linear-gradient(145deg, #ffffff, #e9eef5);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  .detail-copy h1 {
    margin-top: 16px;
    font-size: clamp(2.8rem, 6vw, 4.85rem);
  }

  .detail-copy > p {
    margin: 20px 0 0;
    font-size: 1.02rem;
  }

  .detail-price {
    margin-top: 26px;
  }

  .detail-price strong {
    display: block;
    font-size: clamp(2rem, 5vw, 3.1rem);
    line-height: 1;
  }

  .detail-price span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-weight: 700;
  }

  .detail-actions {
    margin-top: 28px;
  }

  .detail-actions .product-button {
    width: auto;
    min-width: 170px;
    padding: 0 24px;
  }

  .spec-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin: 28px 0 0;
    gap: 12px;
  }

  .spec-item {
    padding: 16px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  .spec-item dt {
    color: var(--muted);
    font-size: 0.74rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .spec-item dd {
    margin: 7px 0 0;
    font-weight: 800;
  }

  .similar-rail {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(250px, 282px);
    max-width: 1180px;
    margin: 0 auto;
    padding: 2px 0 12px;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x proximity;
  }

  .similar-rail .product-card {
    scroll-snap-align: start;
  }

  .device-art {
    position: relative;
    display: block;
    transform: translateZ(0);
  }

  .device-art.large {
    transform: scale(1.18);
  }

  .device-art.phone {
    width: 132px;
    height: 260px;
    border: 10px solid #20242b;
    border-radius: 32px;
    background:
      radial-gradient(circle at 64% 18%, rgba(255, 255, 255, 0.72), transparent 11%),
      linear-gradient(150deg, #0ea5e9, #111827 62%);
    box-shadow:
      22px 26px 0 rgba(23, 24, 28, 0.1),
      inset 0 0 0 1px rgba(255, 255, 255, 0.18);
  }

  .device-art.phone::before {
    content: "";
    position: absolute;
    top: 12px;
    left: 50%;
    width: 54px;
    height: 17px;
    background: #030507;
    border-radius: 999px;
    transform: translateX(-50%);
  }

  .device-art.phone::after {
    content: "";
    position: absolute;
    right: -48px;
    bottom: 34px;
    width: 82px;
    height: 82px;
    border: 9px solid rgba(32, 36, 43, 0.88);
    border-radius: 24px;
    background:
      radial-gradient(circle at 28% 28%, #111827 0 13px, transparent 14px),
      radial-gradient(circle at 72% 28%, #111827 0 13px, transparent 14px),
      radial-gradient(circle at 50% 70%, #111827 0 13px, transparent 14px),
      rgba(255, 255, 255, 0.78);
    box-shadow: 0 16px 30px rgba(23, 24, 28, 0.16);
  }

  .device-art.laptop {
    width: 230px;
    height: 144px;
    border: 12px solid #20242b;
    border-radius: 12px 12px 5px 5px;
    background: linear-gradient(145deg, #bae6fd, #2563eb);
    box-shadow: 0 24px 42px rgba(23, 24, 28, 0.16);
  }

  .device-art.laptop::after {
    content: "";
    position: absolute;
    right: -34px;
    bottom: -30px;
    left: -34px;
    height: 18px;
    background: linear-gradient(180deg, #e5e7eb, #cbd5e1);
    border-radius: 4px 4px 16px 16px;
  }

  .device-art.watch {
    width: 124px;
    height: 154px;
    border: 11px solid #20242b;
    border-radius: 38px;
    background:
      radial-gradient(circle at 62% 24%, rgba(255, 255, 255, 0.72), transparent 12%),
      linear-gradient(145deg, #111827, #22c55e);
    box-shadow: 0 24px 42px rgba(23, 24, 28, 0.15);
  }

  .device-art.watch::before,
  .device-art.watch::after {
    content: "";
    position: absolute;
    left: 50%;
    width: 54px;
    height: 76px;
    background: linear-gradient(180deg, #d8dee8, #aeb8c8);
    transform: translateX(-50%);
    z-index: -1;
  }

  .device-art.watch::before {
    top: -78px;
    border-radius: 18px 18px 6px 6px;
  }

  .device-art.watch::after {
    bottom: -78px;
    border-radius: 6px 6px 18px 18px;
  }

  .device-art.audio {
    width: 188px;
    height: 150px;
  }

  .device-art.audio::before,
  .device-art.audio::after {
    content: "";
    position: absolute;
    top: 14px;
    width: 64px;
    height: 98px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 38px 38px 22px 22px;
    box-shadow: 0 22px 34px rgba(23, 24, 28, 0.14);
  }

  .device-art.audio::before {
    left: 23px;
    transform: rotate(-8deg);
  }

  .device-art.audio::after {
    right: 23px;
    transform: rotate(8deg);
  }

  .device-art.audio span,
  .device-art.audio b {
    position: absolute;
    bottom: 2px;
    width: 22px;
    height: 86px;
    background: #ffffff;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 18px 28px rgba(23, 24, 28, 0.12);
  }

  .device-art.audio span {
    left: 58px;
    transform: rotate(-5deg);
  }

  .device-art.audio b {
    right: 58px;
    transform: rotate(5deg);
  }

  .mini-icon {
    position: relative;
    display: inline-block;
    width: 22px;
    height: 30px;
    border: 3px solid currentColor;
    border-radius: 7px;
  }

  .mini-icon.mac {
    width: 30px;
    height: 20px;
    border-radius: 4px;
  }

  .mini-icon.mac::after {
    content: "";
    position: absolute;
    right: -7px;
    bottom: -8px;
    left: -7px;
    height: 4px;
    background: currentColor;
    border-radius: 0 0 5px 5px;
  }

  .mini-icon.watch {
    width: 21px;
    height: 27px;
    border-radius: 8px;
  }

  .mini-icon.watch::before,
  .mini-icon.watch::after {
    content: "";
    position: absolute;
    left: 4px;
    width: 8px;
    height: 9px;
    background: currentColor;
  }

  .mini-icon.watch::before { top: -11px; }
  .mini-icon.watch::after { bottom: -11px; }

  .mini-icon.airpods {
    width: 28px;
    height: 24px;
    border: 0;
  }

  .mini-icon.airpods::before,
  .mini-icon.airpods::after {
    content: "";
    position: absolute;
    top: 0;
    width: 9px;
    height: 24px;
    background: currentColor;
    border-radius: 10px 10px 5px 5px;
  }

  .mini-icon.airpods::before { left: 4px; }
  .mini-icon.airpods::after { right: 4px; }

  .checkout-panel {
    padding-top: 34px;
    padding-bottom: 82px;
  }

  .checkout-box {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 20px;
    padding: 24px;
    color: var(--white);
    background: #15171b;
    border-radius: var(--radius);
  }

  .checkout-box h2 {
    margin: 0;
    font-size: 1.6rem;
  }

  .checkout-box p {
    margin: 8px 0 0;
    color: #cbd5e1;
    line-height: 1.55;
  }

  .footer-wrap {
    background: var(--paper);
    border-top: 1px solid var(--line);
  }

  .footer {
    display: grid;

    const reservations = loadReservations();
    const now = Date.now();
    let changed = false;

    Object.entries(reservations).forEach(([productId, entry]) => {
      if (!entry.proofAttached && entry.expiresAt && entry.expiresAt <= now) {
        delete reservations[productId];
        changed = true;
      }
    });

    if (changed) {
      saveReservations(reservations);
    }

    return changed;

        </div>
        <div class="hero-display" aria-hidden="true">
          <div class="hero-device-stack">
            ${productArt(products[0], "large")}
          </div>
        </div>
      </section>

      <section class="section alt" id="categorias">
        ${sectionHeader("Categorias", "Escolha por tipo de produto", "Telas separadas para iPhone, Mac, Apple Watch e AirPods.")}
        <div class="category-grid">${categoryCards()}</div>
      </section>

      <section class="section" id="destaques">
        ${sectionHeader("Destaques", "Produtos em destaque", "Modelos com maior procura e disponibilidade para reserva imediata.")}
        ${productGrid(featured)}
      </section>

      <section class="checkout-panel">
        <div class="checkout-box">
          <div>
            <h2>Atendimento direto da loja</h2>
            <p>Tire dúvidas sobre disponibilidade, garantia, retirada e formas de pagamento pelo WhatsApp.</p>
          </div>
          <a class="button primary" href="${WHATSAPP_URL}" target="_blank" rel="noopener">Chamar agora</a>
        </div>
      </section>
    `;
  }

  function renderAllProducts() {
    app.innerHTML = `
      <section class="collection-hero">
        ${breadcrumbs([{ label: "Início", href: "#/" }], "Todos os produtos")}
        <h1>Todos os <span>produtos</span></h1>
        <p>Veja o catálogo completo da iTech e entre na página de cada produto para comprar ou reservar.</p>
      </section>
      ${filterRow("all")}
      <section class="section" style="padding-top: 0;">
        ${productGrid(products)}
      </section>
    `;
  }

  function renderCategory(slug) {
    const category = categories.find((item) => item.slug === slug);

    if (!category) {
      renderNotFound();
      return;
    }

    const items = products.filter((product) => product.category === slug);

    app.innerHTML = `
      <section class="collection-hero">
        ${breadcrumbs([{ label: "Início", href: "#/" }, { label: "Produtos", href: "#/produtos" }], category.name)}
        <h1><span>${escapeHtml(category.name)}</span></h1>
        <p>${escapeHtml(category.description)}</p>
      </section>
      ${filterRow(slug)}
      <section class="section" style="padding-top: 0;">
        ${productGrid(items)}
      </section>
    `;
  }

  function renderProduct(productId) {
    const product = products.find((item) => item.id === productId);

    if (!product) {
      renderNotFound();
      return;
    }

    const status = getProductStatus(product);
    const disabled = status.blocked ? "disabled" : "";
    const similar = products
      .filter((item) => item.category === product.category && item.id !== product.id)
      .slice(0, 6);

    app.innerHTML = `
      <section class="detail-page">
        ${breadcrumbs([
          { label: "Início", href: "#/" },
          { label: categoryName(product.category), href: `#/categoria/${product.category}` }
        ], product.name)}
        <div class="detail-layout">
          <div class="detail-media">
            <div class="product-visual ${product.color}" style="width:min(84%,420px);min-height:390px;">
              ${productArt(product, "large")}
            </div>
          </div>
          <div class="detail-copy">
            <span class="stock-badge${status.blocked ? "" : " available"}" style="position:static;">${escapeHtml(status.label)}</span>
            <h1>${escapeHtml(product.name)}</h1>
            <p>${escapeHtml(product.description)}</p>
            <div class="detail-price">
              <strong>${formatMoney(product.price)}</strong>
              <span>${escapeHtml(product.installments)}</span>
            </div>
            <div class="detail-actions">
              <button class="product-button dark" type="button" data-checkout="buy" data-product="${product.id}" ${disabled}>Comprar</button>
              <button class="product-button secondary" type="button" data-checkout="reserve" data-product="${product.id}" ${disabled}>Reservar com 50%</button>
              <a class="product-button secondary" href="${WHATSAPP_URL}" target="_blank" rel="noopener">Tirar dúvida</a>
            </div>
            <dl class="spec-list">
              ${product.specs.map((spec, index) => `
                <div class="spec-item">
                  <dt>${index === 0 ? "Capacidade" : index === 1 ? "Cor" : index === 2 ? "Status" : "Entrega"}</dt>
                  <dd>${escapeHtml(spec)}</dd>
                </div>
              `).join("")}
              <div class="spec-item">
                <dt>Condição</dt>
                <dd>${escapeHtml(product.condition)}</dd>
              </div>
              <div class="spec-item">
                <dt>Pagamento</dt>
                <dd>Pix ou reserva</dd>
              </div>
            </dl>
          </div>
        </div>
      </section>

      <section class="section alt">
        ${sectionHeader("Semelhantes", "Produtos semelhantes", `Outras opções de ${categoryName(product.category)} disponíveis na iTech.`)}
        <div class="similar-rail">${similar.map(productCard).join("")}</div>
      </section>
    `;
  }

  function breadcrumbs(items, current) {
    return `
      <nav class="breadcrumb" aria-label="Caminho">
        ${items.map((item) => `<a href="${item.href}">${escapeHtml(item.label)}</a><span>/</span>`).join("")}
        <span>${escapeHtml(current)}</span>
      </nav>
    `;
  }

  function renderNotFound() {
    app.innerHTML = `
      <section class="collection-hero">
        ${breadcrumbs([{ label: "Início", href: "#/" }], "Página não encontrada")}
        <h1>Produto não encontrado</h1>
      </section>
      <div class="empty-state">
        <h2>Esse endereço não está no catálogo.</h2>
        <p>Volte para a tela de produtos e escolha uma categoria disponível.</p>
        <a class="button primary" href="#/produtos">Ver produtos</a>
      </div>
    `;
  }

  function parseRoute() {
    const raw = window.location.hash.replace(/^#\/?/, "");
    const [screen, slug] = raw.split("/");

    if (!screen) return { screen: "home" };
    return { screen, slug };
  }

  function render() {
    cleanExpiredReservations();
    renderNav();

    const route = parseRoute();

    if (route.screen === "home") {
      renderHome();
    } else if (route.screen === "produtos") {
      renderAllProducts();
    } else if (route.screen === "categoria") {
      renderCategory(route.slug);
    } else if (route.screen === "produto") {
      renderProduct(route.slug);
    } else {
      renderNotFound();
    }

    window.scrollTo({ top: 0, behavior: "auto" });
  }

  function openCheckout(productId, mode) {
    const product = products.find((item) => item.id === productId);
    if (!product) return;

    const percent = mode === "reserve" ? 50 : 100;
    const amount = product.price * (percent / 100);
    const reservations = loadReservations();
    const existing = reservations[productId];

    reservations[productId] = {
      mode,
      percent,
      amount,
      expiresAt: existing?.proofAttached ? null : Date.now() + RESERVATION_MS,
      proofAttached: Boolean(existing?.proofAttached),
      receiptName: existing?.receiptName || "",
      createdAt: existing?.createdAt || Date.now()
    };

    saveReservations(reservations);
    render();
    showCheckoutModal(productId);
  }

  function showCheckoutModal(productId) {
    const product = products.find((item) => item.id === productId);
    const reservation = getReservation(productId) || loadReservations()[productId];
    if (!product || !reservation) return;

    const title = reservation.mode === "reserve" ? "Reserva do produto" : "Compra do produto";
    const amountLabel = reservation.percent === 50 ? "50% do valor" : "100% do valor";
    const statusLabel = product.condition === "Novo" ? "Esgotado" : "Vendido";

    modal.innerHTML = `
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
        <div class="modal-header">
          <div>
            <span class="pill">${escapeHtml(product.name)}</span>
            <h2 id="checkoutTitle">${escapeHtml(title)}</h2>
          </div>
          <button class="close-button" type="button" data-close-modal aria-label="Fechar">X</button>
        </div>
        <div class="modal-body">
          <div class="timer-box">
            <div class="timer" id="checkoutTimer">05:00</div>
            <div class="timer-copy">
              <strong>Produto reservado por 5 minutos.</strong>
              <span>Realize o Pix para a chave abaixo e clique em anexar comprovante para concluir a compra.</span>
            </div>
          </div>
          <div class="pix-box">
            <div class="pix-line"><span>Produto</span><strong>${escapeHtml(product.name)}</strong></div>
            <div class="pix-line"><span>Produto ficará como</span><strong>${escapeHtml(statusLabel)}</strong></div>
            <div class="pix-line"><span>Pagamento solicitado</span><strong>${escapeHtml(amountLabel)}</strong></div>
            <div class="pix-line"><span>Valor Pix</span><strong>${formatMoney(reservation.amount)}</strong></div>
            <div class="pix-line"><span>Chave Pix</span><strong>${escapeHtml(PIX_KEY)}</strong></div>
          </div>
          <div class="modal-actions">
            <label class="file-button" for="receiptFile">Anexar comprovante</label>
            <input class="receipt-input" id="receiptFile" type="file" accept="image/*,.pdf" data-receipt="${product.id}">
            <button class="button secondary" type="button" data-copy-pix>Copiar chave Pix</button>
            <a class="button primary" href="${WHATSAPP_URL}" target="_blank" rel="noopener">Falar no WhatsApp</a>
          </div>
          <div class="modal-feedback" id="modalFeedback">${reservation.proofAttached ? `Comprovante anexado: ${escapeHtml(reservation.receiptName || "arquivo recebido")}. Aguardando confirmação.` : ""}</div>
        </div>
      </section>
    `;

    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");
    document.body.classList.add("modal-open");
    startCheckoutTimer(product.id);
  }

  function startCheckoutTimer(productId) {
    clearInterval(checkoutTimer);

    const timerEl = document.querySelector("#checkoutTimer");
    const feedbackEl = document.querySelector("#modalFeedback");
    if (!timerEl) return;

    function tick() {
      const reservations = loadReservations();
      const entry = reservations[productId];

      if (!entry) {
        timerEl.textContent = "00:00";
        if (feedbackEl) feedbackEl.textContent = "Tempo encerrado. O produto voltou ao catálogo.";
        clearInterval(checkoutTimer);
        render();
        return;
      }

      if (entry.proofAttached) {
        timerEl.textContent = "OK";
        if (feedbackEl) {
          feedbackEl.textContent = `Comprovante anexado: ${entry.receiptName || "arquivo recebido"}. Aguardando confirmação.`;
        }
        clearInterval(checkoutTimer);
        render();
        return;
      }

      const remaining = Math.max(0, entry.expiresAt - Date.now());
      const minutes = String(Math.floor(remaining / 60000)).padStart(2, "0");
      const seconds = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");
      timerEl.textContent = `${minutes}:${seconds}`;

      if (remaining <= 0) {
        delete reservations[productId];
        saveReservations(reservations);
        if (feedbackEl) feedbackEl.textContent = "Tempo encerrado. O produto voltou ao catálogo.";
        clearInterval(checkoutTimer);
        render();
      }
    }

    tick();
    checkoutTimer = setInterval(tick, 1000);
  }

  function closeModal() {
    clearInterval(checkoutTimer);
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");
    modal.innerHTML = "";
    document.body.classList.remove("modal-open");
  }

  document.addEventListener("click", (event) => {
    const checkoutButton = event.target.closest("[data-checkout]");
    const closeButton = event.target.closest("[data-close-modal]");
    const copyButton = event.target.closest("[data-copy-pix]");

    if (checkoutButton) {
      openCheckout(checkoutButton.dataset.product, checkoutButton.dataset.checkout);
      return;
    }

    if (closeButton) {
      closeModal();
      return;
    }

    if (copyButton) {
      navigator.clipboard?.writeText(PIX_KEY);
      const feedbackEl = document.querySelector("#modalFeedback");
      if (feedbackEl) feedbackEl.textContent = "Chave Pix copiada.";
    }
  });

  modal.addEventListener("click", (event) => {
    if (event.target === modal) {
      closeModal();
    }
  });

  document.addEventListener("change", (event) => {
    const input = event.target.closest("[data-receipt]");
    if (!input || !input.files?.length) return;

    const productId = input.dataset.receipt;
    const reservations = loadReservations();
    const entry = reservations[productId];
    if (!entry) return;

    entry.proofAttached = true;
    entry.receiptName = input.files[0].name;
    entry.expiresAt = null;
    saveReservations(reservations);
    startCheckoutTimer(productId);
    render();
  });

  window.addEventListener("hashchange", render);
  window.addEventListener("storage", render);

  setInterval(() => {
    if (cleanExpiredReservations()) {
      render();
    }
  }, 30000);

  render();
</script>
</body>
</html>
